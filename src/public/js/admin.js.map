// Module
var code = "<div class=\"file-preview-frame krajee-default\" data-id=\"{{ id }}\">\n    <div class=\"shop-file-content\">\n        <img src=\"{{{ src }}}\"\n            class=\"file-preview-image kv-preview-data\"\n            style=\"max-width:100%;max-height:100%;\">\n    </div>\n    <div class=\"file-thumbnail-footer\">\n        <div class=\"file-footer-caption\" title=\"{{ name }}\">\n            <div class=\"file-caption-info\">{{ name }}</div>\n        </div>\n        <div class=\"file-actions\">\n            <div class=\"shop-file-footer-buttons\">\n                <button type=\"button\"\n                    class=\"kv-file-remove btn btn-sm btn-kv btn-default btn-outline-secondary\">\n                    <i class=\"glyphicon glyphicon-trash\"></i>\n                </button>\n                <a data-fancybox=\"single\" data-src=\"{{{ src }}}\"\n                    class=\"kv-file-zoom btn btn-sm btn-kv btn-default btn-outline-secondary\">\n                    <i class=\"glyphicon glyphicon-zoom-in\"></i>\n                </a>\n            </div>\n        </div>\n        <div class=\"clearfix\"></div>\n    </div>\n</div>\n";
// Exports
module.exports = code;
