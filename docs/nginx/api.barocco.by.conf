server {
    if ($host = api.barocco.by) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name api.barocco.by;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.barocco.by;

    root /home/www-user/www/api.barocco.by/current/public;
    index index.php;

    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 50M;

    error_log  /var/log/nginx/api.barocco.by.error.log;
    access_log /var/log/nginx/api.barocco.by.access.log;

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Специальная обработка для всех URL содержащих old-admin/automation/stock с увеличенными таймаутами (20 минут)
    location ~ /old-admin/automation/stock {
        # Напрямую передаем запрос в index.php с увеличенными таймаутами
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param PHP_ADMIN_VALUE "max_execution_time = 1200\nrequest_terminate_timeout = 1200";
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_buffers 16 32k;
        fastcgi_buffer_size 64k;
        fastcgi_connect_timeout 1200s;
        fastcgi_read_timeout 1200s;
        fastcgi_send_timeout 1200s;
        include fastcgi_params;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|webp|map)$ {
        expires 7d;
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_buffers 16 32k;
        fastcgi_buffer_size 64k;
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
    ssl_certificate /etc/letsencrypt/live/api.barocco.by/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.barocco.by/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
