name: PHPStan

on:
  push:
    branches:
      - master
  pull_request_target:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  phpstan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          coverage: none

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Download and extract sxGeo database
        run: |
          wget https://sypexgeo.net/files/SxGeoCountry.zip
          unzip SxGeoCountry.zip -d database/sxgeo

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            src/vendor
          key: composer-${{ runner.os }}-php8.5-${{ hashFiles('src/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php8.5-

      - name: Install dependencies
        run: composer install --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Execute PHPStan
        run: vendor/bin/phpstan analyse
